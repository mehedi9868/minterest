<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minterest — সুন্দর ও হালকা ডিজাইন</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #0b0d10;          /* পেজ ব্যাকগ্রাউন্ড */
      --panel:#0f1318;        /* হেডার/ইনপুট ব্যাকগ্রাউন্ড */
      --text:#e7ecf3;         /* বডি টেক্সট */
      --muted:#9aa4b2;        /* হালকা টেক্সট */
      --brand:#7c5cff;        /* ব্র্যান্ড রঙ ১ */
      --brand-2:#26e4a7;      /* ব্র্যান্ড রঙ ২ */
      --border:#1b2431;       /* বর্ডার */
      --card:#0f141b;         /* কার্ড */
      --card-hover:#121a23;   /* কার্ড হোভার */
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius-lg:18px;
      --radius-md:12px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; color:var(--text); font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans";
      background: radial-gradient(1200px 800px at 80% -10%, rgba(124,92,255,.15), transparent 60%),
                  radial-gradient(900px 600px at 10% 10%, rgba(38,228,167,.1), transparent 55%), var(--bg);
    }
    .shell{max-width:1200px; margin:0 auto; padding:0 18px}

    /* Header */
    header{position:sticky; top:0; z-index:40; backdrop-filter:saturate(1.2) blur(10px);
      background: linear-gradient(180deg, rgba(11,13,16,.85), rgba(11,13,16,.65)); border-bottom:1px solid var(--border)}
    .bar{display:flex; align-items:center; gap:14px; padding:14px 0}
    .logo{display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:.2px}
    .logo-badge{display:grid; place-items:center; width:40px; height:40px; border-radius:12px;
      background:linear-gradient(135deg, var(--brand), var(--brand-2)); box-shadow: var(--shadow)}
    .logo-badge span{color:#0a0d10}
    .brand{font-size:18px}

    /* Search + actions — IDs আগের মতই রাখা হয়েছে */
    #searchForm{flex:1; display:flex; align-items:center; gap:10px; background:var(--panel);
      border:1px solid var(--border); border-radius:999px; padding:10px 14px; box-shadow: inset 0 0 0 1px rgba(124,92,255,.0);}
    #searchForm:focus-within{ box-shadow: 0 0 0 3px rgba(124,92,255,.25) }
    #searchInput{ flex:1; background:transparent; border:0; outline:0; color:var(--text); font: 500 14px/1 Inter}
    .icon{width:18px; height:18px; opacity:.75}

    .actions{display:flex; align-items:center; gap:8px}
    .btn{border:1px solid var(--border); background:var(--panel); color:var(--text); padding:10px 14px; border-radius:999px; font:600 13px/1 Inter; cursor:pointer; transition: transform .15s ease}
    .btn:hover{transform: translateY(-1px)}
    .btn.primary{background: linear-gradient(135deg, rgba(124,92,255,.25), rgba(38,228,167,.2)); border-color:transparent}

    /* Chips (ID অপরিবর্তিত) */
    #chips{display:flex; gap:8px; overflow:auto; padding:10px 0 18px}
    .chip{white-space:nowrap; padding:9px 12px; border-radius:999px; background:#121821; border:1px solid var(--border); color:var(--muted); font:600 12px/1 Inter}
    .chip.active{background:#1b2330; color:#d9e1ee; border-color:#2a3546}

    /* Masonry Grid (ID অপরিবর্তিত) */
    #grid{ column-count: 1; column-gap: 16px; padding-bottom:50px}
    @media (min-width:560px){ #grid{ column-count: 2 } }
    @media (min-width:860px){ #grid{ column-count: 3 } }
    @media (min-width:1140px){ #grid{ column-count: 4 } }

    /* Card generic (তোমার JS যা জেনারেট করবে তার জন্য ডিফল্ট স্টাইল) */
    .card{ break-inside: avoid; margin: 0 0 16px; position:relative; border-radius: var(--radius-lg); overflow:hidden; background:var(--card); border:1px solid var(--border); box-shadow: var(--shadow); transition: transform .18s ease, box-shadow .18s ease, background .2s}
    .card:hover{ transform: translateY(-2px); background:var(--card-hover); box-shadow: 0 14px 40px rgba(0,0,0,.45) }
    .card img{ width:100%; display:block }
    .pill{ backdrop-filter: blur(8px); background:rgba(15,20,27,.6); border:1px solid rgba(255,255,255,.08); color:#eaf2ff; padding:8px 10px; border-radius:999px; font:700 12px/1 Inter }

    /* Avatar/Like (কমন ক্লাস নাম) */
    .meta{ position:absolute; left:10px; right:10px; top:10px; display:flex; justify-content:space-between; align-items:center; }
    .avatar{ display:flex; align-items:center; gap:8px; background:rgba(0,0,0,.35); padding:6px 8px; border-radius:999px; border:1px solid rgba(255,255,255,.08)}
    .avatar img{ width:20px; height:20px; border-radius:50%; display:block }
    .heart{ padding:6px 8px; border-radius:999px; border:1px solid rgba(255,255,255,.08); background:rgba(0,0,0,.35)}

    /* Footer */
    footer{ text-align:center; color:var(--muted); padding:30px 16px; border-top:1px solid var(--border) }
    .tiny{ font-size:12px }
  .fab{position:fixed; right:22px; bottom:22px; width:64px; height:64px; border:0; border-radius:50%; font:800 28px/1 Inter; color:#081018; cursor:pointer; box-shadow:0 12px 40px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.06); background:linear-gradient(135deg, var(--brand), var(--brand-2)); transition: transform .15s ease, box-shadow .15s ease}
    .fab:hover{ transform: translateY(-2px); box-shadow:0 18px 50px rgba(0,0,0,.55) }
    </style>
</head>
<body>
  <header>
    <div class="shell">
      <div class="bar">
        <div class="logo" aria-label="Minterest">
          <div class="logo-badge"><span>Mi</span></div>
          <div class="brand">Minterest</div>
        </div>
        <!-- তোমার আগের JS যাতে কাজ করে, সেইজন্য একই ID রাখা হয়েছে -->
        <!-- Search/Explore removed as requested -->
        <div style="flex:1"></div>
        <div class="actions"></div>
      </div>
      <!-- chips removed -->
    </div>
  </header>
    </div>
  </header>

  <main class="shell">
    <section id="grid" aria-live="polite"></section>
  </main>

  <footer>
    <div class="tiny">© <span id="yr"></span> Minterest • Crafted with ❤</div>
  </footer>

  <!-- Floating + Button (no extra JS; hook this ID in app_min.js) -->
  <button id="addBtn" aria-label="Add" class="fab">+</button>

  <script src="app_min.js"></script>
  <script>document.getElementById('yr').textContent=new Date().getFullYear();</script>
</body>
</html>
