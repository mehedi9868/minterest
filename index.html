<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minterest — Minimal</title>
  <style>
    :root{--bg:#0b0f14;--card:#121821;--text:#e8eef6;--muted:#8aa0b2;--accent:#4da3ff;--accent2:#7c4dff}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,#0b0f14,#0c121a 40%,#0a1018);color:var(--text)}
    .grid{column-width: 320px; column-gap: 16px; padding: 16px}
    .card{break-inside: avoid; margin-bottom:16px; border-radius:16px; overflow:hidden; background:var(--card); border:1px solid #1e2936; box-shadow:0 1px 0 #0b1320}
    .card img{display:block;width:100%;height:auto;background:#0b1320}
    .meta{padding:8px 10px;color:var(--muted);font-size:12px;display:flex;justify-content:space-between;align-items:center}
    .fab{position:fixed; right:16px; bottom:16px; width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; display:flex; align-items:center; justify-content:center; font-size:28px; border:none; box-shadow:0 10px 30px rgba(77,163,255,.35); cursor:pointer; z-index:20}
    .fab:active{transform: translateY(1px)}
    .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:90px; background:#141c27; border:1px solid #24334a; color:var(--text); padding:10px 14px; border-radius:10px; box-shadow:0 6px 30px rgba(0,0,0,.4); display:none; z-index:30}
    /* Modal */
    .overlay{position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:40}
    .modal{width:min(520px,92vw); background:#0e1420; border:1px solid #223145; border-radius:16px; box-shadow:0 20px 80px rgba(0,0,0,.6); padding:16px}
    .row{display:flex; flex-direction:column; gap:6px; margin-bottom:12px}
    .label{color:#a9bed1; font-size:12px}
    .input{background:#111827; border:1px solid #263346; color:#e8eef6; border-radius:10px; padding:10px 12px; outline:none}
    .modal-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:6px}
    @media (max-width:600px){ .grid{column-width: 180px; padding-bottom:80px} }
  </style>
</head>
<body>

<section id="grid" class="grid"></section>

<button id="fab" class="fab" title="লিংক দিন">＋</button>
<div id="toast" class="toast"></div>

<!-- Modal UI -->
<div id="overlay" class="overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <h2 style="margin:0 0 8px 0; font-size:18px;">Google Drive ফোল্ডার যোগ করুন</h2>
    <div class="row">
      <label class="label" for="link">Drive ফোল্ডার লিংক (ঐচ্ছিক)</label>
      <input id="link" class="input" placeholder="ফাঁকা রাখলে ডিফল্ট ফোল্ডার থেকে লোড হবে" />
    </div>
    <div class="row">
      <label class="label" for="password">পাসওয়ার্ড</label>
      <input id="password" type="password" class="input" placeholder="i love you" />
    </div>
    <div class="modal-actions">
      <button id="btnCancel">Cancel</button>
      <button id="btnAdd">Add</button>
    </div>
  </div>
</div>

<script src="app_min.js" defer></script>
</body>
</html>
